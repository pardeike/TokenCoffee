name: TokenCoffee
options:
  minimumXcodeGenVersion: 2.42.0
  postGenCommand: ./Scripts/patch-iconcomposer-filetype.sh
  deploymentTarget:
    macOS: "15.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    "EXCLUDED_ARCHS[sdk=macosx*]": x86_64
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    RUN_CLANG_STATIC_ANALYZER: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_MODULE_VERIFIER: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu11 gnu++14"
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    OTHER_SWIFT_FLAGS: -strict-concurrency=complete -warnings-as-errors
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES
    Release:
      ONLY_ACTIVE_ARCH: NO
packages:
  TokenUsageForecast:
    url: https://github.com/pardeike/TokenUsageForecast.git
    from: 1.1.0
targets:
  TokenCoffeeCore:
    type: framework
    platform: macOS
    sources:
      - Sources/TokenCoffeeCore
    info:
      path: Sources/TokenCoffeeCore/Info.plist
      properties:
        CFBundleIdentifier: com.pardeike.TokenCoffeeCore
        CFBundleName: TokenCoffeeCore
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
    dependencies:
      - package: TokenUsageForecast
        product: TokenUsageForecast
      - sdk: IOKit.framework
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pardeike.TokenCoffeeCore
  TokenCoffee:
    productName: Token Coffee
    type: application
    platform: macOS
    sources:
      - path: Sources/TokenCoffeeApp
        excludes:
          - AppIcon.icon
      - path: Sources/TokenCoffeeApp/AppIcon.icon
        type: file
        buildPhase: resources
    resources:
      - Sources/TokenCoffeeApp/Resources
    dependencies:
      - target: TokenCoffeeCore
      - sdk: SwiftUI.framework
      - sdk: Charts.framework
      - sdk: AppKit.framework
      - sdk: CloudKit.framework
      - sdk: Security.framework
    info:
      path: Sources/TokenCoffeeApp/Info.plist
      properties:
        CFBundleIdentifier: com.pardeike.TokenCoffee
        CFBundleName: Token Coffee
        CFBundleDisplayName: Token Coffee
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.developer-tools
        LSUIElement: true
        LSMinimumSystemVersion: "15.0"
        ITSAppUsesNonExemptEncryption: false
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/TokenCoffeeApp/TokenCoffee.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: W65292CD8T
        ENABLE_APP_SANDBOX: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_INCOMING_NETWORK_CONNECTIONS: NO
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
        ENABLE_RESOURCE_ACCESS_AUDIO_INPUT: NO
        ENABLE_RESOURCE_ACCESS_BLUETOOTH: NO
        ENABLE_RESOURCE_ACCESS_CALENDARS: NO
        ENABLE_RESOURCE_ACCESS_CAMERA: NO
        ENABLE_RESOURCE_ACCESS_CONTACTS: NO
        ENABLE_RESOURCE_ACCESS_LOCATION: NO
        ENABLE_RESOURCE_ACCESS_PRINTING: NO
        ENABLE_RESOURCE_ACCESS_USB: NO
        CURRENT_PROJECT_VERSION: "0"
        MARKETING_VERSION: "1.0.0"
        PRODUCT_NAME: Token Coffee
        PRODUCT_BUNDLE_IDENTIFIER: com.pardeike.TokenCoffee
        PROVISIONING_PROFILE_SPECIFIER: ""
      configs:
        Debug:
          CLOUDKIT_CONTAINER_ENVIRONMENT: Development
        Release:
          CLOUDKIT_CONTAINER_ENVIRONMENT: Production
  TokenCoffeeCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/TokenCoffeeCoreTests
    dependencies:
      - target: TokenCoffeeCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.pardeike.TokenCoffeeCoreTests
schemes:
  TokenCoffee:
    build:
      targets:
        TokenCoffee: all
        TokenCoffeeCoreTests: [test]
    test:
      targets:
        - TokenCoffeeCoreTests
